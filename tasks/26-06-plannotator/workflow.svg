<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="780" viewBox="0 0 1200 780"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5"
                    flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="heroGlow" x="-8%" y="-12%" width="122%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="10"
                    flood-color="#FEC514" flood-opacity="0.30"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#CBD2DC" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#8B95A5"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#36B37E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" fill="#F0F3F8"/>
  <rect width="1200" height="780" fill="url(#grid)"/>

  <!-- ===================== HEADER ===================== -->
  <rect x="40" y="20" width="5" height="36" rx="2" fill="#FEC514"/>
  <text x="56" y="44"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="900" font-size="26" fill="#1C1E23" letter-spacing="-0.4">
    AI Coding Workflow · Where Plannotator Adds Value
  </text>
  <text x="56" y="62"
        font-family="Inter, system-ui, sans-serif"
        font-size="12" fill="#5A6068">
    The workflow is the same — plan review becomes visual, annotated, and iterative before a line of code is written
  </text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#D3DAE6" stroke-width="1"/>

  <!-- ===================== PLANNOTATOR CALLOUT BADGE ===================== -->
  <rect x="418" y="84" width="158" height="26" rx="13" fill="#FEC514"/>
  <text x="497" y="101"
        font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#1C1E23" text-anchor="middle">
    &#x2733; Plannotator
  </text>
  <line x1="497" y1="110" x2="497" y2="124" stroke="#FEC514" stroke-width="2"/>

  <!-- ===================== ARROWS (drawn before nodes so nodes sit on top) ===================== -->

  <!-- User Task to AI Plans -->
  <line x1="142" y1="215" x2="194" y2="215"
        stroke="#8B95A5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AI Plans to Plan Review -->
  <line x1="348" y1="215" x2="414" y2="215"
        stroke="#8B95A5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Plan Review to Approved diamond (exits hero node at right center y=215) -->
  <line x1="580" y1="215" x2="646" y2="215"
        stroke="#8B95A5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Approved to Execute (green = success path) -->
  <line x1="736" y1="215" x2="796" y2="215"
        stroke="#36B37E" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="758" y="208" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#36B37E" font-weight="600">yes</text>

  <!-- Execute to Done (green) -->
  <line x1="948" y1="215" x2="1004" y2="215"
        stroke="#36B37E" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Loop: not approved - from diamond bottom, down, left, up into Plan Review -->
  <path d="M 691,241 L 691,330 L 497,330 L 497,248"
        stroke="#8B95A5" stroke-width="1.5" fill="none"
        marker-end="url(#arr)"/>
  <text x="706" y="258"
        font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#8B95A5" font-weight="600">no</text>
  <text x="594" y="324"
        font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#8B95A5" text-anchor="middle">annotate &amp; revise</text>

  <!-- ===================== NODE 1: User Task ===================== -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="190" width="112" height="50" rx="8"
          fill="white" stroke="#D3DAE6" stroke-width="1.5"/>
  </g>
  <rect x="30" y="190" width="4" height="50" rx="2" fill="#FF957D"/>
  <text x="44" y="211" font-family="Inter, system-ui, sans-serif"
        font-size="11.5" font-weight="700" fill="#1C1E23">User Task</text>
  <text x="44" y="228" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#8B95A5">prompt / goal</text>

  <!-- ===================== NODE 2: AI Generates Plan ===================== -->
  <g filter="url(#cardShadow)">
    <rect x="194" y="190" width="154" height="50" rx="8"
          fill="white" stroke="#D3DAE6" stroke-width="1.5"/>
  </g>
  <rect x="194" y="190" width="4" height="50" rx="2" fill="#FEC514"/>
  <text x="208" y="211" font-family="Inter, system-ui, sans-serif"
        font-size="11.5" font-weight="700" fill="#1C1E23">AI Generates Plan</text>
  <text x="208" y="228" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#8B95A5">step-by-step breakdown</text>

  <!-- ===================== NODE 3: Plan Review HERO ===================== -->
  <g filter="url(#heroGlow)">
    <rect x="414" y="124" width="166" height="184" rx="10"
          fill="#FFFBEA" stroke="#FEC514" stroke-width="2.5"/>
  </g>
  <!-- Top band inside hero -->
  <rect x="414" y="124" width="166" height="38" rx="10" fill="#FFF3C0"/>
  <rect x="414" y="148" width="166" height="14" fill="#FFF3C0"/>
  <text x="497" y="149" font-family="Inter, system-ui, sans-serif"
        font-size="13" font-weight="800" fill="#92700A" text-anchor="middle">
    Plan Review
  </text>
  <line x1="424" y1="162" x2="570" y2="162" stroke="#FEC514" stroke-width="1" opacity="0.5"/>
  <!-- Bullet list inside hero -->
  <circle cx="428" cy="178" r="3" fill="#FEC514"/>
  <text x="436" y="182" font-family="Inter, system-ui, sans-serif"
        font-size="10.5" fill="#5A4A00">Read the full plan</text>
  <circle cx="428" cy="196" r="3" fill="#FEC514"/>
  <text x="436" y="200" font-family="Inter, system-ui, sans-serif"
        font-size="10.5" fill="#5A4A00">Annotate specific steps</text>
  <circle cx="428" cy="214" r="3" fill="#FEC514"/>
  <text x="436" y="218" font-family="Inter, system-ui, sans-serif"
        font-size="10.5" fill="#5A4A00">Leave inline feedback</text>
  <circle cx="428" cy="232" r="3" fill="#FEC514"/>
  <text x="436" y="236" font-family="Inter, system-ui, sans-serif"
        font-size="10.5" fill="#5A4A00">Approve or send back</text>
  <!-- Action buttons at bottom of hero node -->
  <rect x="422" y="248" width="66" height="22" rx="11" fill="#36B37E"/>
  <text x="455" y="263" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="700" fill="white" text-anchor="middle">Approve</text>
  <rect x="498" y="248" width="74" height="22" rx="11"
        fill="none" stroke="#8B95A5" stroke-width="1.5"/>
  <text x="535" y="263" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="600" fill="#8B95A5" text-anchor="middle">Send notes</text>
  <!-- Arrow re-layer: exits hero at x=580, y=215 (already drawn above) -->

  <!-- ===================== NODE 4: Approved? diamond ===================== -->
  <g filter="url(#cardShadow)">
    <polygon points="691,189 737,215 691,241 645,215"
             fill="white" stroke="#D3DAE6" stroke-width="1.5"/>
  </g>
  <text x="691" y="211" font-family="Inter, system-ui, sans-serif"
        font-size="9.5" font-weight="700" fill="#1C1E23" text-anchor="middle">Approved?</text>

  <!-- ===================== NODE 5: Execute Plan ===================== -->
  <g filter="url(#cardShadow)">
    <rect x="796" y="190" width="152" height="50" rx="8"
          fill="white" stroke="#36B37E" stroke-width="1.5"/>
  </g>
  <rect x="796" y="190" width="4" height="50" rx="2" fill="#36B37E"/>
  <text x="810" y="211" font-family="Inter, system-ui, sans-serif"
        font-size="11.5" font-weight="700" fill="#1C1E23">Execute Plan</text>
  <text x="810" y="228" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#8B95A5">AI writes the code</text>

  <!-- ===================== NODE 6: Done ===================== -->
  <g filter="url(#cardShadow)">
    <rect x="1004" y="190" width="114" height="50" rx="25"
          fill="#E6F9F0" stroke="#36B37E" stroke-width="2"/>
  </g>
  <text x="1061" y="211" font-family="Inter, system-ui, sans-serif"
        font-size="12" font-weight="700" fill="#1A6940" text-anchor="middle">Done</text>
  <text x="1061" y="228" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#36B37E" text-anchor="middle">code ships</text>

  <!-- ===================== SCREENSHOT SECTION ===================== -->
  <!-- Section divider label -->
  <line x1="40" y1="348" x2="1160" y2="348" stroke="#D3DAE6" stroke-width="1"/>
  <text x="40" y="366" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#98A2B3" letter-spacing="1.4">
    PLAN REVIEW IN PRACTICE
  </text>

  <!-- Left column label: Before -->
  <rect x="60" y="375" width="510" height="26" rx="6" fill="#2D3A4A"/>
  <text x="315" y="392" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="white" text-anchor="middle"
        letter-spacing="1.2">BEFORE · TERMINAL PROMPT</text>

  <!-- Left placeholder box -->
  <rect x="60" y="401" width="510" height="330" rx="0"
        fill="#E8ECF2" stroke="#A0A8B4" stroke-width="1.5"
        stroke-dasharray="6,4"/>
  <!-- Placeholder icon and text -->
  <rect x="220" y="510" width="190" height="110" rx="6"
        fill="none" stroke="#B0B8C4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Image placeholder icon -->
  <rect x="288" y="528" width="54" height="42" rx="4"
        fill="none" stroke="#C8D0DA" stroke-width="2"/>
  <circle cx="298" cy="537" r="5" fill="#C8D0DA"/>
  <polyline points="288,560 302,545 316,555 330,540 342,560"
            fill="none" stroke="#C8D0DA" stroke-width="2"/>
  <text x="315" y="592" font-family="Inter, system-ui, sans-serif"
        font-size="11" fill="#98A2B3" text-anchor="middle">add terminal screenshot</text>
  <text x="315" y="608" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#B0B8C4" text-anchor="middle">510 x 330 px</text>

  <!-- Right column label: After -->
  <rect x="630" y="375" width="510" height="26" rx="6" fill="#FEC514"/>
  <text x="885" y="392" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#1C1E23" text-anchor="middle"
        letter-spacing="1.2">WITH PLANNOTATOR</text>

  <!-- Right placeholder box -->
  <rect x="630" y="401" width="510" height="330" rx="0"
        fill="#FFFBEA" stroke="#FEC514" stroke-width="1.5"
        stroke-dasharray="6,4"/>
  <!-- Placeholder icon and text -->
  <rect x="790" y="510" width="190" height="110" rx="6"
        fill="none" stroke="#FEC514" stroke-width="1.5" stroke-dasharray="4,3"
        opacity="0.6"/>
  <!-- Image placeholder icon -->
  <rect x="858" y="528" width="54" height="42" rx="4"
        fill="none" stroke="#FEC514" stroke-width="2" opacity="0.6"/>
  <circle cx="868" cy="537" r="5" fill="#FEC514" opacity="0.5"/>
  <polyline points="858,560 872,545 886,555 900,540 912,560"
            fill="none" stroke="#FEC514" stroke-width="2" opacity="0.5"/>
  <text x="885" y="592" font-family="Inter, system-ui, sans-serif"
        font-size="11" fill="#92700A" text-anchor="middle">add Plannotator screenshot</text>
  <text x="885" y="608" font-family="Inter, system-ui, sans-serif"
        font-size="10" fill="#B0B8C4" text-anchor="middle">510 x 330 px</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="40" y1="742" x2="1160" y2="742" stroke="#D3DAE6" stroke-width="1"/>
  <text x="40" y="762" font-family="Inter, system-ui, sans-serif"
        font-size="11" fill="#B0B8C4">
    github.com/backnotprop/plannotator · elastic.co/elasticsearch-serverless
  </text>

  <!-- Elastic logo -->
  <g transform="translate(1010, 742) scale(0.18)">
    <path d="M232.957 153.223C232.971 147.219 231.128 141.358 227.681 136.442C224.234 131.526 219.352 127.797 213.703 125.764C214.217 123.144 214.476 120.48 214.476 117.809C214.481 108.971 211.684 100.358 206.485 93.2094C201.286 86.061 193.955 80.7452 185.545 78.0262C177.135 75.3072 168.079 75.3251 159.679 78.0774C151.28 80.8296 143.97 86.1744 138.8 93.3433C134.985 90.3875 130.311 88.7553 125.486 88.6939C120.661 88.6325 115.947 90.1454 112.059 93.0033C108.17 95.8612 105.32 99.9085 103.938 104.532C102.556 109.156 102.718 114.103 104.401 118.626C98.7383 120.69 93.8436 124.439 90.3751 129.368C86.9067 134.297 85.0309 140.17 85.0001 146.197C84.9844 152.221 86.8366 158.103 90.3018 163.031C93.767 167.959 98.6748 171.692 104.349 173.716C103.847 176.335 103.591 178.995 103.584 181.662C103.576 190.49 106.371 199.094 111.568 206.231C116.764 213.368 124.093 218.671 132.497 221.374C140.902 224.077 149.948 224.042 158.331 221.272C166.714 218.503 174 213.142 179.141 205.964C182.944 208.928 187.61 210.57 192.43 210.642C197.251 210.714 201.964 209.212 205.854 206.363C209.744 203.515 212.599 199.475 213.986 194.858C215.373 190.24 215.216 185.296 213.539 180.776C219.205 178.716 224.103 174.968 227.573 170.039C231.043 165.109 232.92 159.234 232.949 153.206" fill="#D8DEE6"/>
